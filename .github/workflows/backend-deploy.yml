name: Backend Deploy to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: xiangxi-api-0420
  BACKEND_PROJECT_PATH: backend/backend.csproj
  DOTNET_VERSION: "10.0.x"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore backend
        run: dotnet restore ${{ env.BACKEND_PROJECT_PATH }}

      - name: Build backend
        run: dotnet build ${{ env.BACKEND_PROJECT_PATH }} --configuration Release --no-restore

      - name: Run backend tests
        if: ${{ hashFiles('backend.Tests/backend.Tests.csproj') != '' }}
        run: dotnet test backend.Tests/backend.Tests.csproj --configuration Release

      - name: Publish backend
        run: dotnet publish ${{ env.BACKEND_PROJECT_PATH }} --configuration Release --output ./publish

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
